<!DOCTYPE html>
<html>
<head>
<title>StudentHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial;
background:#f4f6fb;
text-align:center;
margin:0;
}

header{
background:#4f46e5;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin:20px auto;
width:300px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:80%;
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

footer{
margin-top:30px;
color:gray;
}
</style>

</head>

<body>

<header>
StudentHub
</header>

<div class="container">

<div class="card">
<h3>Percentage Calculator</h3>

<input type="number" id="m1" placeholder="Subject 1"><br>
<input type="number" id="m2" placeholder="Subject 2"><br>
<input type="number" id="m3" placeholder="Subject 3"><br>
<input type="number" id="m4" placeholder="Subject 4"><br>
<input type="number" id="m5" placeholder="Subject 5"><br>

<button onclick="calc()">Calculate</button>

<h2 id="result"></h2>
</div>

</div>

<footer>
Made by Vaishnavi
</footer>

<script>
function calc(){
let a=Number(document.getElementById("m1").value)
let b=Number(document.getElementById("m2").value)
let c=Number(document.getElementById("m3").value)
let d=Number(document.getElementById("m4").value)
let e=Number(document.getElementById("m5").value)

let total=a+b+c+d+e
let percent=total/5

document.getElementById("result").innerText="Percentage: "+percent+"%"
}
</script>

</body>
</html>
