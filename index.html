<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

  padding:15px;

.card{
  .card{
transition:0.3s;

.card:hover{

}
  background:white;
  border-radius:12px;
  padding:20px;
  margin:15px 0;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
  padding:10px 15px;
  border:none;

body{

background:#f4f6fb;
text-align:center;
margin:0;
}

header{
background:#4f46e5;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{

padding:20px;

</head>

<body>

<header>
StudentHub
<div class="dashboard">

<div class="dash-card">
📊
<p>Calculator</p>
</div>

<div class="dash-card">
⏱️
<p>Pomodoro</p>
</div>

<div class="dash-card">
📅
<p>Countdown</p>
</div>

<div class="dash-card">
📝
<p>Notes</p>
</div>

<div class="dash-card">
🎓
<p>GPA</p>
</div>

</div>
</header>

<div class="container">

<div class="card">
<h3>Percentage Calculator</h3>

<input type="number" id="m1" placeholder="Subject 1"><br>
<input type="number" id="m2" placeholder="Subject 2"><br>
<input type="number" id="m3" placeholder="Subject 3"><br>
<input type="number" id="m4" placeholder="Subject 4"><br>
<input type="number" id="m5" placeholder="Subject 5"><br>

<button onclick="calc()">Calculate</button>

<h2 id="result"></h2>
</div>
<div class="card">
<h3>Pomodoro Study Timer</h3>

<label>Minutes:</label>
<input type="number" id="minutes" value="25"><br>
<button onclick="startTimer()">Start</button>
<h2 id="timer">25:00</h2>
</div>
<div class="card">
<h3>Exam Countdown</h3>

<label>Enter exam date:</label>
<input type="date" id="examDate"><br>
<button onclick="startCountdown()">Start Countdown</button>

<h2 id="countdown"></h2>
</div>
<div class="card">
<h3>Notes Saver</h3>

<textarea id="notes" rows="5" placeholder="Write your notes here..."></textarea><br>
<button onclick="saveNotes()">Save</button>
<button onclick="loadNotes()">Load</button>
<h4 id="notesMsg"></h4>
</div>
<div class="card">
<h3>GPA / Marks Tracker</h3>

<label>Number of Subjects:</label>
<input type="number" id="numSubjects" value="5" min="1"><br>
<button onclick="createSubjects()">Set Subjects</button>

<div id="subjectsContainer"></div>

<button onclick="calculateGPA()">Calculate GPA</button>

<h2 id="gpaResult"></h2>
</div>
<div class="card">
<h3>Study To-Do List</h3>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>
</div>
</div>

<footer>
Made by Vaishnavi
</footer>

<script>
function calc(){
let a=Number(document.getElementById("m1").value)
let b=Number(document.getElementById("m2").value)
let c=Number(document.getElementById("m3").value)
let d=Number(document.getElementById("m4").value)
let e=Number(document.getElementById("m5").value)

let total=a+b+c+d+e
let percent=total/5

document.getElementById("result").innerText="Percentage: "+percent+"%"
}
</script>
<script>
let timerInterval;

function startTimer(){
  clearInterval(timerInterval);
  let minutes = Number(document.getElementById("minutes").value);
  let time = minutes * 60;

  timerInterval = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time % 60;
    s = s < 10 ? '0'+s : s;
    document.getElementById("timer").innerText = m + ":" + s;
    time--;
    if(time < 0) clearInterval(timerInterval);
  }, 1000);
}
</script>
<script>
let countdownInterval;

function startCountdown(){
  clearInterval(countdownInterval);
  let exam = new Date(document.getElementById("examDate").value).getTime();

  countdownInterval = setInterval(()=>{
    let now = new Date().getTime();
    let distance = exam - now;

    if(distance < 0){
      clearInterval(countdownInterval);
      document.getElementById("countdown").innerText = "Exam Time! 🏆";
      return;
    }

    let days = Math.floor(distance / (1000*60*60*24));
    let hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    let minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    let seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("countdown").innerText =
      days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
  }, 1000);
}
</script>
<script>
function saveNotes(){
  let content = document.getElementById("notes").value;
  localStorage.setItem("studentNotes", content);
  document.getElementById("notesMsg").innerText = "Notes saved ✅";
}

function loadNotes(){
  let content = localStorage.getItem("studentNotes") || "";
  document.getElementById("notes").value = content;
  document.getElementById("notesMsg").innerText = "Notes loaded 📖";
}
</script>
<script>

function createSubjects() {

  let n = Number(document.getElementById("numSubjects").value);
  let container = document.getElementById("subjectsContainer");

  container.innerHTML = "";

  for (let i = 1; i <= n; i++) {

    container.innerHTML +=
      '<div>' +
      '<label>Subject ' + i + ' Marks:</label><br>' +
      '<input type="number" class="marks" placeholder="Obtained"><br>' +
      '<label>Max Marks:</label><br>' +
      '<input type="number" class="maxMarks" placeholder="Total"><br><br>' +
      '</div>';

  }
}

function calculateGPA() {

  let marks = document.getElementsByClassName("marks");
  let maxMarks = document.getElementsByClassName("maxMarks");

  let total = 0;
  let totalMax = 0;

  for (let i = 0; i < marks.length; i++) {

    total += Number(marks[i].value);
    totalMax += Number(maxMarks[i].value);

  }

  if(totalMax === 0){
    document.getElementById("gpaResult").innerText = "Please enter marks.";
    return;
  }

  let percentage = (total / totalMax) * 100;
  let gpa = (percentage / 20).toFixed(2);

  document.getElementById("gpaResult").innerText =
  "Percentage: " + percentage.toFixed(2) + "% | GPA: " + gpa + "/5";

}

</script>
<script>
if ("serviceWorker" in navigator) {
 navigator.serviceWorker.register("sw.js")
 .then(function(){
   console.log("Service Worker Registered");
 });
}
</script>
<script>
  function addTask(){
  let input=document.getElementById("taskInput");
  let list=document.getElementById("taskList");

  let li=document.createElement("li");
  li.innerText=input.value;

  li.onclick=function(){
    li.style.textDecoration="line-through";
  }

  list.appendChild(li);
  input.value="";
}
</script>
function scrollToTop(){
  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}
<div class="bottom-nav">
  <button onclick="scrollToTop()">Home</button>
  <button onclick="showTools()">Tools</button>
  <button onclick="showNotes()">Notes</button>
</div>

</script>
</body>
